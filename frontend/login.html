<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — NexTrade</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Nex<span>Trade</span></a>
  <div class="nav-btns">
    <a href="register.html" class="btn btn-primary">Create Account</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p>Login to your NexTrade account</p>
    <div id="alert" style="display:none;"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Login</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user) {
    window.location.href = user.role === 'admin' ? 'admin/admin-dashboard.html' : 'dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Logging in...';
    btn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const API = window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : '/api';
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      window.location.href = data.user.role === 'admin' ? 'admin/admin-dashboard.html' : 'dashboard.html';
    } catch (err) {
      const alert = document.getElementById('alert');
      alert.className = 'alert alert-error';
      alert.textContent = err.message;
      alert.style.display = 'block';
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  });
</script>
<div id="google_translate_element"></div>
<script src="js/translate.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
