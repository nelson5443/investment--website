<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions — NexTrade Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="adminSidebar"></aside>
  <main class="main-content">
    <div class="top-bar">
      <h1>Transactions</h1>
      <div style="display:flex;gap:0.5rem;">
        <select id="filterStatus" onchange="filterTx()" style="padding:0.55rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <select id="filterType" onchange="filterTx()" style="padding:0.55rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;">
          <option value="">All Types</option>
          <option value="deposit">Deposit</option>
          <option value="withdrawal">Withdrawal</option>
        </select>
      </div>
    </div>

    <div class="stat-cards" style="margin-bottom:1.5rem;">
      <div class="stat-card"><div class="icon">⏳</div><div class="label">Pending</div><div class="value" id="pendingCount">0</div></div>
      <div class="stat-card"><div class="icon">✅</div><div class="label">Approved</div><div class="value" id="approvedCount">0</div></div>
      <div class="stat-card"><div class="icon">❌</div><div class="label">Rejected</div><div class="value" id="rejectedCount">0</div></div>
      <div class="stat-card"><div class="icon">💰</div><div class="label">Total Approved</div><div class="value" id="totalApproved">$0</div></div>
    </div>

    <div class="card">
      <table>
        <thead><tr><th>User</th><th>Type</th><th>Amount</th><th>Method</th><th>Plan</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody id="txTable"><tr><td colspan="8" style="color:var(--muted);text-align:center;">Loading...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="admin-utils.js"></script>
<script src="admin-sidebar.js"></script>
<script>
  let allTxns = [];
  const admin = requireAdmin();
  if (admin) { renderAdminSidebar('Transactions'); loadTxns(); }

  async function loadTxns() {
    allTxns = await apiFetch('/transactions');
    document.getElementById('pendingCount').textContent = allTxns.filter(t => t.status === 'pending').length;
    document.getElementById('approvedCount').textContent = allTxns.filter(t => t.status === 'approved').length;
    document.getElementById('rejectedCount').textContent = allTxns.filter(t => t.status === 'rejected').length;
    const totalApproved = allTxns.filter(t => t.status === 'approved').reduce((s, t) => s + t.amount, 0);
    document.getElementById('totalApproved').textContent = formatCurrency(totalApproved);
    renderTable(allTxns);
  }

  function renderTable(txns) {
    document.getElementById('txTable').innerHTML = txns.length === 0
      ? '<tr><td colspan="8" style="color:var(--muted);text-align:center;">No transactions found</td></tr>'
      : txns.map(t => `
        <tr>
          <td>${t.user?.fullName || '—'}<br/><span style="color:var(--muted);font-size:0.78rem;">${t.user?.email || ''}</span></td>
          <td style="text-transform:capitalize;">${t.type}</td>
          <td>${formatCurrency(t.amount)}</td>
          <td>${t.method || '—'}</td>
          <td>${t.planId ? `<span style="color:var(--primary);font-size:0.82rem;">${t.planId.name}<br/><span style="color:var(--muted);">${t.planId.roiPercent}% / ${t.planId.durationDays}d</span></span>` : '<span style="color:var(--muted);">—</span>'}</td>
          <td><span class="badge badge-${t.status === 'approved' ? 'success' : t.status === 'rejected' ? 'danger' : 'warning'}">${t.status}</span></td>
          <td>${formatDate(t.createdAt)}</td>
          <td>${t.status === 'pending' ? `
            <div style="display:flex;gap:0.4rem;">
              <button class="btn btn-primary" style="font-size:0.75rem;padding:0.3rem 0.7rem;" onclick="updateTx('${t._id}','approved')">Approve</button>
              <button class="btn btn-danger" style="font-size:0.75rem;padding:0.3rem 0.7rem;" onclick="updateTx('${t._id}','rejected')">Reject</button>
            </div>` : `<span style="color:var(--muted);font-size:0.82rem;">${t.note || '—'}</span>`}
          </td>
        </tr>`).join('');
  }

  function filterTx() {
    const status = document.getElementById('filterStatus').value;
    const type = document.getElementById('filterType').value;
    renderTable(allTxns.filter(t => (!status || t.status === status) && (!type || t.type === type)));
  }

  async function updateTx(id, status) {
    const note = status === 'approved' ? 'Approved by admin' : 'Rejected by admin';
    await apiFetch(`/transactions/${id}`, { method: 'PUT', body: JSON.stringify({ status, note }) });
    loadTxns();
  }
</script>
<div id="google_translate_element"></div>
<script src="../js/translate.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
