<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Chat — NexTrade Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="adminSidebar"></aside>
  <main class="main-content">
    <div class="top-bar"><h1>Live Chat</h1></div>

    <div style="display:grid;grid-template-columns:280px 1fr;gap:1.5rem;height:calc(100vh - 120px);">

      <!-- CONVERSATIONS LIST -->
      <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
        <div style="padding:1rem;border-bottom:1px solid var(--border);font-weight:600;">Conversations</div>
        <div id="conversationsList" style="flex:1;overflow-y:auto;"></div>
      </div>

      <!-- CHAT WINDOW -->
      <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
        <div id="chatHeader" style="padding:1rem;border-bottom:1px solid var(--border);font-weight:600;color:var(--muted);">Select a conversation</div>
        <div id="chatMessages" style="flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.5rem;"></div>
        <div id="replyBox" style="display:none;padding:0.75rem;border-top:1px solid var(--border);gap:0.5rem;align-items:center;">
          <input id="replyInput" type="text" placeholder="Type a reply..."
            style="flex:1;padding:0.65rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;font-size:0.9rem;"/>
          <button class="btn btn-primary" onclick="sendReply()">Reply</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="admin-utils.js"></script>
<script src="admin-sidebar.js"></script>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
  let selectedUserId = null;
  let selectedUserName = null;
  let allMessages = [];
  const admin = requireAdmin();

  if (admin) {
    renderAdminSidebar('Live Chat');
    const socket = io(window.location.hostname === 'localhost' ? 'http://localhost:5000' : window.location.origin, { reconnection: true, reconnectionDelay: 1000 });
    socket.emit('join', 'admin');
    socket.emit('join', admin.id);

    loadConversations();
    // Poll every 4 seconds so new messages appear without refresh
    setInterval(() => {
      loadConversations();
      if (selectedUserId) openConversation(selectedUserId, selectedUserName, false);
    }, 4000);

    socket.on('receiveMessage', ({ senderId, message, isAdminReply }) => {
      if (!isAdminReply) {
        loadConversations();
        if (selectedUserId === senderId) appendMessage(message, 'customer');
      }
    });

    async function loadConversations() {
      allMessages = await apiFetch('/chat/conversations');
      const seen = new Set();
      const conversations = [];
      allMessages.forEach(m => {
        const sid = m.sender?._id || m.senderId;
        if (!m.isAdminReply && sid && !seen.has(sid)) {
          seen.add(sid);
          conversations.push({ ...m, _sid: sid, _sname: m.sender?.fullName || m.senderName || sid });
        }
      });

      document.getElementById('conversationsList').innerHTML = conversations.length === 0
        ? '<div style="padding:1rem;color:var(--muted);font-size:0.85rem;">No conversations yet</div>'
        : conversations.map(m => `
          <div onclick="openConversation('${m._sid}','${m._sname}')"
            style="padding:0.85rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.2s;background:${selectedUserId===m._sid?'var(--card)':'transparent'}"
            onmouseover="this.style.background='var(--card)'" onmouseout="this.style.background='${selectedUserId===m._sid?'var(--card)':'transparent'}'">
            <div style="font-weight:600;font-size:0.9rem;">${m._sname}</div>
            <div style="color:var(--muted);font-size:0.78rem;margin-top:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.message}</div>
          </div>`).join('');
    }

    window.openConversation = function(userId, userName, resetScroll = true) {
      selectedUserId = userId;
      selectedUserName = userName;
      document.getElementById('chatHeader').textContent = `Chat with ${userName}`;
      document.getElementById('replyBox').style.display = 'flex';

      const msgs = allMessages.filter(m => {
        const sid = m.sender?._id || m.senderId;
        return (!m.isAdminReply && sid === userId) || (m.isAdminReply && (m.receiverId === userId || m.receiver === userId));
      }).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      msgs.forEach(m => appendMessage(m.message, m.isAdminReply ? 'admin' : 'customer'));
      if (resetScroll) container.scrollTop = container.scrollHeight;
    };

    function appendMessage(msg, from) {
      const isAdmin = from === 'admin';
      const container = document.getElementById('chatMessages');
      container.innerHTML += `
        <div style="display:flex;justify-content:${isAdmin ? 'flex-end' : 'flex-start'};align-items:flex-end;gap:0.4rem;">
          ${!isAdmin ? `<div style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;">${selectedUserName?.charAt(0) || '?'}</div>` : ''}
          <div style="background:${isAdmin ? 'var(--primary)' : 'var(--card)'};color:${isAdmin ? '#000' : 'var(--text)'};padding:0.55rem 0.9rem;border-radius:12px;max-width:75%;font-size:0.88rem;">${msg}</div>
          ${isAdmin ? `<div style="width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#000;flex-shrink:0;">A</div>` : ''}
        </div>`;
      container.scrollTop = container.scrollHeight;
    }

    async function sendReply() {
      const input = document.getElementById('replyInput');
      const msg = input.value.trim();
      if (!msg || !selectedUserId) return;
      input.value = '';
      await apiFetch('/chat/reply', { method: 'POST', body: JSON.stringify({ userId: selectedUserId, message: msg }) });
      socket.emit('sendMessage', { senderId: admin.id, receiverId: selectedUserId, message: msg, isAdminReply: true });
      appendMessage(msg, 'admin');
    }

    document.getElementById('replyInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendReply(); });
    window.sendReply = sendReply;
  }
</script>
<div id="google_translate_element"></div>
<script src="../js/translate.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
