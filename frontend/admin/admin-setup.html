<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Setup — NexTrade</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">Nex<span>Trade</span> <span style="color:var(--muted);font-size:0.8rem;">Setup</span></a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create Admin Account</h2>
    <p>First-time setup — create your administrator account</p>
    <div style="background:rgba(245,158,11,0.1);border:1px solid var(--gold);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.2rem;font-size:0.85rem;color:var(--gold);">
      ⚠️ Delete or restrict this page after setup is complete.
    </div>
    <div id="alert" style="display:none;"></div>
    <form id="setupForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Admin Name" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@nextrade.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Admin Secret Key</label>
        <input type="password" id="adminSecret" placeholder="From your .env file" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Create Admin Account</button>
    </form>
    <div class="auth-footer"><a href="admin-login.html">← Back to Admin Login</a></div>
  </div>
</div>

<script>
  document.getElementById('setupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alert');
    btn.textContent = 'Creating...'; btn.disabled = true;
    try {
      const res = await fetch('http://localhost:5000/api/auth/register-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          adminSecret: document.getElementById('adminSecret').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Admin account created! Redirecting to login...';
      alertEl.style.display = 'block';
      setTimeout(() => window.location.href = 'admin-login.html', 1500);
    } catch (err) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = err.message;
      alertEl.style.display = 'block';
      btn.textContent = 'Create Admin Account'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
