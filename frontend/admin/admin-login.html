<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — NexTrade</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav>
  <a href="../index.html" class="logo">Nex<span>Trade</span> <span style="color:var(--muted);font-size:0.8rem;">Admin</span></a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Admin Login</h2>
    <p>Restricted access — authorized personnel only</p>
    <div id="alert" style="display:none;"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@nextrade.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Login as Admin</button>
    </form>
    <div class="auth-footer"><a href="../login.html">← Customer Login</a></div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user?.role === 'admin') window.location.href = 'admin-dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alert');
    btn.textContent = 'Logging in...'; btn.disabled = true;
    try {
      const res = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      if (data.user.role !== 'admin') throw new Error('Not an admin account');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'admin-dashboard.html';
    } catch (err) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = err.message;
      alertEl.style.display = 'block';
      btn.textContent = 'Login as Admin'; btn.disabled = false;
    }
  });
</script>
<div id="google_translate_element"></div>
<script src="../js/translate.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
