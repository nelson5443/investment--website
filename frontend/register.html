<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — NexTrade</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Nex<span>Trade</span></a>
  <div class="nav-btns">
    <a href="login.html" class="btn btn-outline">Login</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p>Join NexTrade and start investing today</p>
    <div id="alert" style="display:none;"></div>
    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user) {
    window.location.href = user.role === 'admin' ? 'admin/admin-dashboard.html' : 'dashboard.html';
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Passwords do not match';
      alertEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch('http://localhost:5000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Account created! Redirecting...';
      alertEl.style.display = 'block';

      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch (err) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = err.message;
      alertEl.style.display = 'block';
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  });
</script>
<div id="google_translate_element"></div>
<script src="js/translate.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
